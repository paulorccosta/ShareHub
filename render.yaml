# Render.com deployment config for ShareHub (Laravel 12 / PHP 8.2).
#
# Render has no native PHP runtime, so this uses a Docker build (see ./Dockerfile)
# with Apache + PHP-FPM-style mod_php. The Dockerfile builds Vite assets in a
# Node stage, then installs PHP deps and serves via Apache on Render's $PORT.

services:
  - type: web
    name: sharehub
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_NAME
        value: ShareHub
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: RUN_MIGRATIONS
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      # Switch FILESYSTEM_DISK to "s3" once Supabase Storage credentials below are filled in.
      - key: FILESYSTEM_DISK
        value: local
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: AWS_USE_PATH_STYLE_ENDPOINT
        value: true
