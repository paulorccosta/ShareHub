name: Keep Render app awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ShareHub
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 --retry 2 --retry-delay 5 "https://sharehub-muw6.onrender.com/")
          echo "Response status: $status"
